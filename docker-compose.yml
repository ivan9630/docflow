services:

  # ─── BACKEND FASTAPI ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuflow-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://docuflow:docuflow@postgres:5432/docuflow
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=docuflow
      - MINIO_SECRET_KEY=docuflow123
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AIRFLOW_URL=http://airflow-webserver:8080
    volumes:
      - ./backend:/app
      - tmp_uploads:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── CELERY WORKER ─────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuflow-worker
    command: celery -A app.celery_app worker --loglevel=info -Q docuflow -c 4
    environment:
      - DATABASE_URL=postgresql+asyncpg://docuflow:docuflow@postgres:5432/docuflow
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=docuflow
      - MINIO_SECRET_KEY=docuflow123
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
      - tmp_uploads:/tmp/uploads
    depends_on:
      - backend
      - redis
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── CELERY FLOWER (monitoring) ─────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuflow-flower
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── FRONTEND REACT (MERN) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuflow-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── AIRFLOW WEBSERVER ─────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: docuflow-airflow-web
    command: webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - AIRFLOW__CORE__FERNET_KEY=UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpaBoTr-tURkdo=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=docuflow2026
      - AIRFLOW_CONN_DOCUFLOW_API=http://backend:8000
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=docuflow123
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - docuflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── AIRFLOW SCHEDULER ─────────────────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: docuflow-airflow-scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - AIRFLOW__CORE__FERNET_KEY=UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpaBoTr-tURkdo=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW_CONN_DOCUFLOW_API=http://backend:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── AIRFLOW WORKER ────────────────────────────────────────────
  airflow-worker:
    image: apache/airflow:2.9.1
    container_name: docuflow-airflow-worker
    command: celery worker
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres-airflow:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
      - AIRFLOW__CORE__FERNET_KEY=UKMzEm3yIuFYEq1y3-2FxPNWSVwRASpaBoTr-tURkdo=
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres-airflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── POSTGRESQL (app) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: docuflow-postgres
    environment:
      POSTGRES_DB: docuflow
      POSTGRES_USER: docuflow
      POSTGRES_PASSWORD: docuflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── POSTGRESQL (airflow) ──────────────────────────────────────
  postgres-airflow:
    image: postgres:16-alpine
    container_name: docuflow-postgres-airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── REDIS ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docuflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── MINIO (Data Lake S3) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: docuflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: docuflow
      MINIO_ROOT_PASSWORD: docuflow123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docuflow-net
    restart: unless-stopped

  # ─── MINIO SETUP ───────────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: docuflow-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 docuflow docuflow123;
      mc mb --ignore-existing local/raw;
      mc mb --ignore-existing local/clean;
      mc mb --ignore-existing local/curated;
      echo 'Buckets Raw/Clean/Curated créés';
      exit 0;
      "
    networks:
      - docuflow-net

volumes:
  postgres_data:
  postgres_airflow_data:
  minio_data:
  airflow_logs:
  tmp_uploads:

networks:
  docuflow-net:
    driver: bridge
